<svg width="1000" height="340" viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LyceumAI — a peripatetic system for bioinformatics research">
  <defs>
    <linearGradient id="marble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6F1E7"/>
      <stop offset="1" stop-color="#E9E0CE"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C9A36A"/>
      <stop offset="0.5" stop-color="#A67C42"/>
      <stop offset="1" stop-color="#7E5B2C"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33312B"/>
      <stop offset="1" stop-color="#211F1A"/>
    </linearGradient>
    <linearGradient id="aegean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3D6E8E"/>
      <stop offset="1" stop-color="#2A4F69"/>
    </linearGradient>
    <pattern id="meander" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 4 36 L 4 4 L 30 4 L 30 30 L 16 30 L 16 16 L 36 16"
            fill="none" stroke="url(#bronze)" stroke-width="4"
            stroke-linejoin="miter" stroke-linecap="square"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Parchment field -->
  <rect x="0" y="0" width="1000" height="340" fill="url(#marble)"/>

  <!-- Greek-key borders -->
  <rect x="0" y="0" width="1000" height="40" fill="url(#meander)" opacity="0.9"/>
  <rect x="0" y="300" width="1000" height="40" fill="url(#meander)" opacity="0.9"/>
  <rect x="0" y="40" width="1000" height="3" fill="url(#bronze)"/>
  <rect x="0" y="297" width="1000" height="3" fill="url(#bronze)"/>

  <!-- ── Left Doric column ── -->
  <g filter="url(#soft)">
    <rect x="86" y="92" width="92" height="14" rx="2" fill="url(#bronze)"/>
    <rect x="92" y="106" width="80" height="150" fill="url(#marble)" stroke="#C9A36A" stroke-width="1.5"/>
    <line x1="106" y1="106" x2="106" y2="256" stroke="#CDBE9E" stroke-width="2"/>
    <line x1="122" y1="106" x2="122" y2="256" stroke="#CDBE9E" stroke-width="2"/>
    <line x1="138" y1="106" x2="138" y2="256" stroke="#CDBE9E" stroke-width="2"/>
    <line x1="154" y1="106" x2="154" y2="256" stroke="#CDBE9E" stroke-width="2"/>
    <rect x="80" y="256" width="104" height="16" rx="2" fill="url(#bronze)"/>
  </g>

  <!-- ── Right Doric column ── -->
  <g filter="url(#soft)">
    <rect x="822" y="92" width="92" height="14" rx="2" fill="url(#bronze)"/>
    <rect x="828" y="106" width="80" height="150" fill="url(#marble)" stroke="#C9A36A" stroke-width="1.5"/>
    <line x1="842" y1="106" x2="842" y2="256" stroke="#CDBE9E" stroke-width="2"/>
    <line x1="858" y1="106" x2="858" y2="256" stroke="#CDBE9E" stroke-width="2"/>
    <line x1="874" y1="106" x2="874" y2="256" stroke="#CDBE9E" stroke-width="2"/>
    <line x1="890" y1="106" x2="890" y2="256" stroke="#CDBE9E" stroke-width="2"/>
    <rect x="816" y="256" width="104" height="16" rx="2" fill="url(#bronze)"/>
  </g>

  <!-- ── DNA double helix (the bios in the logos) ── -->
  <g transform="translate(500,180)" filter="url(#soft)">
    <g stroke="url(#aegean)" stroke-width="5" fill="none" stroke-linecap="round">
      <path d="M -34 -78 C 34 -52, 34 -26, -34 0 C -102 26, -102 52, -34 78" transform="translate(34,0)"/>
      <path d="M 34 -78 C -34 -52, -34 -26, 34 0 C 102 26, 102 52, 34 78" transform="translate(-34,0)"/>
    </g>
    <g stroke="url(#bronze)" stroke-width="3.5" stroke-linecap="round">
      <line x1="-26" y1="-66" x2="26" y2="-66"/>
      <line x1="-32" y1="-44" x2="32" y2="-44"/>
      <line x1="-30" y1="-22" x2="30" y2="-22"/>
      <line x1="-14" y1="0"  x2="14"  y2="0"/>
      <line x1="-30" y1="22" x2="30" y2="22"/>
      <line x1="-32" y1="44" x2="32" y2="44"/>
      <line x1="-26" y1="66" x2="26" y2="66"/>
    </g>
  </g>

  <!-- ── Owl of Athena (wisdom) above the helix ── -->
  <g transform="translate(500,96)" filter="url(#soft)">
    <circle cx="-12" cy="0" r="13" fill="url(#marble)" stroke="url(#bronze)" stroke-width="3"/>
    <circle cx="12"  cy="0" r="13" fill="url(#marble)" stroke="url(#bronze)" stroke-width="3"/>
    <circle cx="-12" cy="0" r="4.5" fill="url(#ink)"/>
    <circle cx="12"  cy="0" r="4.5" fill="url(#ink)"/>
    <path d="M 0 4 L -6 13 L 6 13 Z" fill="url(#bronze)"/>
  </g>

  <!-- ── Title set in classical capitals ── -->
  <text x="500" y="196" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="60"
        letter-spacing="10" fill="url(#ink)" font-weight="700">LYCEUM<tspan fill="#A67C42">AI</tspan></text>
  <text x="500" y="232" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="17"
        letter-spacing="3" fill="#6B5B3E" font-style="italic">ΣΧΟΛΗ · the peripatetic research academy</text>
  <text x="500" y="262" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="13.5"
        letter-spacing="1.5" fill="#8A7757">from question, through evidence, to manuscript</text>
</svg>
